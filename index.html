<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Amin Esmaeili — Full-Stack Developer</title>
    <meta
      name="description"
      content="Amin Esmaeili is a full-stack developer working with React, .NET and Node.js. Selected projects, experience and certifications."
    />
    <meta name="author" content="Amin Esmaeili" />
    <!-- Matches --ink-950, the page background, so mobile browser chrome blends in -->
    <meta name="theme-color" content="#0b0e14" />

    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <!--
      Canonical is the Vercel domain, the primary deployment. The GitHub Pages
      build serves this same tag, which is intended: it points search engines at
      the canonical copy instead of indexing github.io as a duplicate.
    -->
    <link rel="canonical" href="https://aminesmaeili-portfolio.vercel.app/" />

    <!-- Link previews: without these the shared card renders blank -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Amin Esmaeili" />
    <meta property="og:title" content="Amin Esmaeili — Full-Stack Developer" />
    <meta
      property="og:description"
      content="Full-stack developer working with React, .NET and Node.js. Selected projects, experience and certifications."
    />
    <meta property="og:url" content="https://aminesmaeili-portfolio.vercel.app/" />
    <meta
      property="og:image"
      content="https://aminesmaeili-portfolio.vercel.app/pxArt.webp"
    />
    <meta property="og:image:alt" content="Pixel-art portrait of Amin Esmaeili" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Amin Esmaeili — Full-Stack Developer" />
    <meta
      name="twitter:description"
      content="Full-stack developer working with React, .NET and Node.js. Selected projects, experience and certifications."
    />
    <meta
      name="twitter:image"
      content="https://aminesmaeili-portfolio.vercel.app/pxArt.webp"
    />

    <!--
      No font <link> tags: Inter and JetBrains Mono are imported from
      node_modules in index.css, so Vite hashes and emits them as build assets.
      Hand-written preload paths would have to be updated by hand every time
      those hashes change, which is exactly how the previous pair ended up
      pointing at files that no longer existed.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
