<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      /* GitHub Pages serves this file for any unknown path. Stash the intended
         route in a query param and bounce to the app, which restores it. */
      (function () {
        var base = '/Portfolio';
        var path = window.location.pathname.indexOf(base) === 0
          ? window.location.pathname.slice(base.length)
          : window.location.pathname;
        var target =
          base + '/?redirect=' + encodeURIComponent(path + window.location.search) +
          window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
